services:
  pg:
    image: postgres:18-alpine
    volumes:
      - postgres_data:/var/lib/postgresql
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    init: true
    volumes:
      - ./backend:/app
      - media_data:/var/www/django/media
    env_file:
      - ./backend/.env
    environment:
      # Explicit for clarity; this is also the default if unset - see
      # `paprika/settings/__init__.py`.
      DJANGO_ENV: development
    command: uv run python manage.py runserver 0.0.0.0:8000
    depends_on:
      pg:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    init: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
